<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Developing (project)</title>
  <!-- Google Font & basic icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef3f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: white;
      border-radius: 40px;
      box-shadow: 0 30px 50px rgba(0, 30, 60, 0.12);
      padding: 2rem 2rem 2.5rem;
    }

    h1 {
      font-weight: 600;
      font-size: 2rem;
      color: #113855;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.25rem;
    }

    .sub {
      color: #4f6f8f;
      margin-bottom: 2rem;
      font-size: 1rem;
      border-left: 4px solid #9bbde2;
      padding-left: 1rem;
    }

    /* route buttons */
    .route-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .route-btn {
      flex: 1 1 200px;
      background: #f4f9ff;
      border: 2px solid transparent;
      border-radius: 36px;
      padding: 1.4rem 1rem;
      font-weight: 600;
      font-size: 1.35rem;
      color: #153f5e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 5px 12px rgba(0,40,70,0.1);
    }

    .route-btn i {
      font-size: 1.5rem;
      color: #2a6a9e;
    }

    .route-btn:hover {
      background: #ffffff;
      border-color: #a3c6f0;
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(20, 70, 120, 0.15);
    }

    .route-btn:active {
      transform: scale(0.98);
    }

    /* bus list container */
    .list-container {
      background: #f8fafd;
      border-radius: 32px;
      padding: 1.5rem 1.2rem;
      border: 1px solid #e0ecf9;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1d4e79;
      font-weight: 600;
      margin-bottom: 1.2rem;
      font-size: 1.2rem;
      border-bottom: 2px dashed #c8ddf5;
      padding-bottom: 0.8rem;
    }

    .bus-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    /* bus card */
    .bus-card {
      background: white;
      border-radius: 26px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 10px rgba(0, 30, 60, 0.03);
      border: 1px solid #e3edf6;
    }

    .bus-icon {
      background: #ddeeff;
      width: 50px;
      height: 50px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #1d6091;
    }

    .info {
      flex: 1;
    }

    .bus-name {
      font-weight: 700;
      font-size: 1.3rem;
      color: #103450;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }

    .bus-number {
      background: #e7f0fe;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1f5682;
    }

    .bus-time {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #46688b;
      font-weight: 500;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .bus-time i {
      color: #4280b5;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #7c99b8;
      font-size: 1.1rem;
    }

    .empty-state i {
      font-size: 2.8rem;
      color: #b7d2ed;
      margin-bottom: 1rem;
      display: block;
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 2rem;
    }

    .loader div {
      width: 12px;
      height: 12px;
      background: #abc1d9;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .loader div:nth-child(2) { animation-delay: 0.2s; }
    .loader div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; background: #326fa8; }
    }

    .footer-note {
      margin-top: 1.8rem;
      font-size: 0.85rem;
      color: #9bb3cc;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <h1><i class="fas fa-bus" style="color: #2a6a9e;"></i> Bus routes</h1>
  <div class="sub">Tharad – Lakhani · live departure</div>

  <!-- two buttons only -->
  <div class="route-row">
    <button class="route-btn" id="btnTharadLakhani">
      <i class="fas fa-arrow-right"></i> Tharad → Lakhani
    </button>
    <button class="route-btn" id="btnLakhaniTharad">
      <i class="fas fa-arrow-left"></i> Lakhani → Tharad
    </button>
  </div>

  <!-- bus list area -->
  <div class="list-container">
    <div class="list-header">
      <i class="fas fa-list-ul"></i> <span id="routeLabel">select a route</span>
    </div>
    <div id="busList" class="bus-list">
      <!-- empty state appears here -->
      <div class="empty-state">
        <i class="fas fa-hand-pointer"></i>
        <p>click a route to see buses</p>
      </div>
    </div>
  </div>
  <div class="footer-note">
    <i class="fas fa-database"></i> data updates automatically
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6uiCzTx_ZJIWYNyTbDDe2Jv4eaJ-XF_A",
    authDomain: "bus-details-cf6b2.firebaseapp.com",
    databaseURL: "https://bus-details-cf6b2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bus-details-cf6b2",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // elements
  const busListDiv = document.getElementById('busList');
  const routeLabel = document.getElementById('routeLabel');
  const btnTharad = document.getElementById('btnTharadLakhani');
  const btnLakhani = document.getElementById('btnLakhaniTharad');

  let currentListener = null;   // to detach previous

  // small helper: escape html (just in case)
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return String(unsafe)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // display loader
  function showLoader() {
    busListDiv.innerHTML = `<div class="loader"><div></div><div></div><div></div></div>`;
  }

  // render bus cards
  function renderBuses(buses) {
    if (!buses || buses.length === 0) {
      busListDiv.innerHTML = `<div class="empty-state"><i class="fas fa-bus-slash"></i><p>no buses found</p></div>`;
      return;
    }

    let html = '';
    buses.forEach(bus => {
      const name = escapeHtml(bus.name || 'Express');
      const number = escapeHtml(bus.number || '');
      const time = escapeHtml(bus.time || '— : —');
      html += `
        <div class="bus-card">
          <div class="bus-icon"><i class="fas fa-bus"></i></div>
          <div class="info">
            <div class="bus-name">
              ${name}
              <span class="bus-number">${number}</span>
            </div>
            <div class="bus-time">
              <i class="fas fa-clock"></i> ${time}
            </div>
          </div>
        </div>
      `;
    });
    busListDiv.innerHTML = html;
  }

  // load a route from firebase
  function loadRoute(routeKey, displayName) {
    // update header label
    routeLabel.innerText = displayName;

    // detach any previous listener
    if (currentListener) {
      currentListener();
      currentListener = null;
    }

    showLoader();

    const dbRef = ref(db, routeKey);
    // attach new listener
    currentListener = onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      let buses = [];
      if (Array.isArray(data)) {
        buses = data;
      } else if (data && typeof data === 'object') {
        // firebase often returns object with numeric keys
        buses = Object.values(data);
      }
      renderBuses(buses);
    }, (error) => {
      console.warn(error);
      busListDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> error loading</div>`;
    });
  }

  // event listeners for buttons
  btnTharad.addEventListener('click', () => {
    loadRoute('tharad-lakhani', 'Tharad → Lakhani');
  });

  btnLakhani.addEventListener('click', () => {
    loadRoute('lakhani-tharad', 'Lakhani → Tharad');
  });

  // clean up on page unload
  window.addEventListener('beforeunload', () => {
    if (currentListener) currentListener();
  });
</script>
</body>
  </html>
